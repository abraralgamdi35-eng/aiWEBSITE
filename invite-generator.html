<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Invite Generator - NEXUS AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0a0a0f;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 20px;
            padding: 40px 50px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 30px 80px rgba(0,0,0,0.4);
        }
        h1 {
            font-size: 28px;
            margin-bottom: 4px;
            background: linear-gradient(135deg, #a78bfa, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            margin-bottom: 24px;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }
        .input-group input {
            flex: 1;
            padding: 12px 16px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px;
            color: white;
            font-size: 14px;
            outline: none;
        }
        .input-group input:focus { border-color: rgba(108,60,255,0.3); }
        .input-group input::placeholder { color: rgba(255,255,255,0.2); }
        .btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #6c3cff, #4f46e5);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            white-space: nowrap;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(108,60,255,0.3); }
        .btn-green { background: linear-gradient(135deg, #34d399, #059669); }
        .btn-red { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .btn-sm { padding: 6px 14px; font-size: 12px; }
        
        .invite-list {
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
        }
        .invite-list::-webkit-scrollbar { width: 4px; }
        .invite-list::-webkit-scrollbar-thumb { background: rgba(108,60,255,0.2); border-radius: 10px; }
        
        .invite-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.04);
            border-radius: 10px;
            margin-bottom: 8px;
            gap: 10px;
            flex-wrap: wrap;
        }
        .invite-item .code {
            font-family: monospace;
            font-size: 13px;
            color: #a78bfa;
            font-weight: 600;
        }
        .invite-item .used {
            font-size: 12px;
            color: rgba(255,255,255,0.2);
        }
        .invite-item .used.yes { color: #34d399; }
        .invite-item .used.no { color: #fbbf24; }
        .invite-item .actions { display: flex; gap: 6px; }
        .empty {
            text-align: center;
            color: rgba(255,255,255,0.15);
            padding: 30px 0;
            font-size: 14px;
        }
        .link-box {
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            padding: 10px 14px;
            margin: 12px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(255,255,255,0.03);
        }
        .link-box input {
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            outline: none;
            flex: 1;
            font-family: monospace;
        }
        .link-box .copy-btn {
            padding: 4px 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 6px;
            color: rgba(255,255,255,0.4);
            cursor: pointer;
            font-size: 12px;
            transition: 0.3s;
        }
        .link-box .copy-btn:hover { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            padding: 10px 24px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 100;
        }
        .toast.show { opacity: 1; }
        .stats {
            display: flex;
            gap: 20px;
            margin: 16px 0;
            font-size: 13px;
            color: rgba(255,255,255,0.3);
        }
        .stats span { color: rgba(255,255,255,0.6); font-weight: 600; }
        @media (max-width: 500px) {
            .container { padding: 24px 20px; }
            .invite-item { flex-direction: column; align-items: stretch; }
            .input-group { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>✦ Invite Generator</h1>
    <p class="subtitle">Create unique invite links for your friends</p>

    <div class="stats">
        Total: <span id="totalCount">0</span> • Used: <span id="usedCount">0</span> • Available: <span id="availableCount">0</span>
    </div>

    <div class="input-group">
        <input type="text" id="friendName" placeholder="Friend's name (optional)" />
        <button class="btn" onclick="generateInvite()">✨ Generate</button>
    </div>

    <div id="linkDisplay" style="display:none;">
        <div class="link-box">
            <input type="text" id="inviteLink" readonly />
            <button class="copy-btn" onclick="copyLink()">📋 Copy</button>
        </div>
    </div>

    <div class="invite-list" id="inviteList">
        <div class="empty">No invites created yet.</div>
    </div>

    <div style="margin-top:16px; display:flex; gap:10px; flex-wrap:wrap;">
        <button class="btn btn-sm btn-green" onclick="exportInvites()">📤 Export</button>
        <button class="btn btn-sm btn-red" onclick="clearAll()">🗑️ Clear All</button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    // ================================================================
    // 🔗 INVITE SYSTEM
    // ================================================================

    // Load invites from localStorage
    let invites = JSON.parse(localStorage.getItem('nexus_invites') || '[]');

    // Your site URL (change this!)
    const SITE_URL = 'https://abraralgamdi35-eng.github.io/aiWEBSITE';

    function generateInvite() {
        const name = document.getElementById('friendName').value.trim() || 'Friend';
        
        // Generate unique code
        const code = generateCode();
        
        const invite = {
            code: code,
            name: name,
            created: new Date().toISOString(),
            used: false,
            usedBy: null
        };
        
        invites.push(invite);
        saveInvites();
        renderInvites();
        
        // Show the link
        const link = `${SITE_URL}/?invite=${code}`;
        document.getElementById('inviteLink').value = link;
        document.getElementById('linkDisplay').style.display = 'block';
        
        showToast(`✅ Invite created for ${name}!`);
        document.getElementById('friendName').value = '';
        updateStats();
    }

    function generateCode() {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        let code = '';
        for (let i = 0; i < 8; i++) {
            code += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return code;
    }

    function renderInvites() {
        const list = document.getElementById('inviteList');
        
        if (invites.length === 0) {
            list.innerHTML = `<div class="empty">No invites created yet.</div>`;
            return;
        }
        
        list.innerHTML = invites.map((inv, index) => `
            <div class="invite-item">
                <div>
                    <div class="code">${inv.code}</div>
                    <div style="font-size:12px;color:rgba(255,255,255,0.2);">
                        ${inv.name} • ${new Date(inv.created).toLocaleDateString()}
                    </div>
                </div>
                <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
                    <span class="used ${inv.used ? 'yes' : 'no'}">${inv.used ? '✅ Used' : '🟡 Available'}</span>
                    ${inv.usedBy ? `<span style="font-size:11px;color:rgba(255,255,255,0.2);">by ${inv.usedBy}</span>` : ''}
                    <div class="actions">
                        <button class="btn btn-sm" onclick="copyInvite('${inv.code}')">📋</button>
                        <button class="btn btn-sm btn-red" onclick="deleteInvite(${index})">✕</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function copyInvite(code) {
        const link = `${SITE_URL}/?invite=${code}`;
        navigator.clipboard.writeText(link);
        showToast('📋 Link copied!');
    }

    function copyLink() {
        const input = document.getElementById('inviteLink');
        input.select();
        navigator.clipboard.writeText(input.value);
        showToast('📋 Link copied!');
    }

    function deleteInvite(index) {
        if (confirm('Delete this invite?')) {
            invites.splice(index, 1);
            saveInvites();
            renderInvites();
            updateStats();
            showToast('🗑️ Invite deleted');
        }
    }

    function clearAll() {
        if (confirm('Delete ALL invites?')) {
            invites = [];
            saveInvites();
            renderInvites();
            updateStats();
            document.getElementById('linkDisplay').style.display = 'none';
            showToast('🗑️ All invites cleared');
        }
    }

    function exportInvites() {
        if (invites.length === 0) {
            showToast('No invites to export');
            return;
        }
        
        let text = '=== NEXUS AI INVITES ===\n\n';
        invites.forEach(inv => {
            text += `Code: ${inv.code}\n`;
            text += `Name: ${inv.name}\n`;
            text += `Used: ${inv.used ? 'Yes' : 'No'}\n`;
            if (inv.usedBy) text += `Used by: ${inv.usedBy}\n`;
            text += `Link: ${SITE_URL}/?invite=${inv.code}\n`;
            text += '---\n\n';
        });
        
        const blob = new Blob([text], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `nexus-invites-${new Date().toISOString().slice(0,10)}.txt`;
        a.click();
        URL.revokeObjectURL(url);
        showToast('📤 Invites exported!');
    }

    function saveInvites() {
        localStorage.setItem('nexus_invites', JSON.stringify(invites));
    }

    function updateStats() {
        const total = invites.length;
        const used = invites.filter(i => i.used).length;
        const available = total - used;
        document.getElementById('totalCount').textContent = total;
        document.getElementById('usedCount').textContent = used;
        document.getElementById('availableCount').textContent = available;
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        clearTimeout(toast._timer);
        toast._timer = setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // Check for invite in URL and mark as used
    function checkInvite() {
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('invite');
        
        if (code) {
            const invite = invites.find(i => i.code === code);
            if (invite && !invite.used) {
                invite.used = true;
                invite.usedBy = 'Guest';
                saveInvites();
                renderInvites();
                updateStats();
                showToast(`✅ Welcome! Invite from ${invite.name} activated`);
                // Redirect to main app or show success
            }
        }
    }

    // ================================================================
    // 🏃 INIT
    // ================================================================

    renderInvites();
    updateStats();
    checkInvite();

    console.log('🔗 NEXUS AI Invite System');
    console.log(`📬 ${invites.length} invites created`);
    console.log('💡 Share the invite link with friends!');
</script>

</body>
</html>
