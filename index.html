<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEXUS AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
<!-- ===== INVITE CHECK ===== -->
<script>
    (function checkInviteAccess() {
        // Check if user already has access
        if (sessionStorage.getItem('nexus_trusted') === 'true') {
            return; // Already logged in
        }

        const urlParams = new URLSearchParams(window.location.search);
        const inviteCode = urlParams.get('invite');

        if (!inviteCode) {
            // No invite code - redirect to invitation page
            window.location.href = 'invite.html';
            return;
        }

        // Check invite validity
        const invites = JSON.parse(localStorage.getItem('nexus_invites') || '[]');
        const validInvite = invites.find(i => i.code === inviteCode && !i.used);

        if (!validInvite) {
            // Invalid or used invite
            window.location.href = 'invite.html?invalid=true';
            return;
        }

        // Mark invite as used
        validInvite.used = true;
        validInvite.usedBy = 'User';
        localStorage.setItem('nexus_invites', JSON.stringify(invites));
        sessionStorage.setItem('nexus_trusted', 'true');
        sessionStorage.setItem('nexus_invite_code', inviteCode);

        // Remove ?invite= from URL
        window.history.replaceState({}, document.title, window.location.pathname);
    })();
</script>
    <!-- ===== CUSTOM MODAL (No "This page says"!) ===== -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box">
            <span class="modal-icon" id="modalIcon">🤔</span>
            <h3 id="modalTitle">Are you sure?</h3>
            <p id="modalMessage">This action cannot be undone.</p>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn-confirm" id="modalConfirmBtn" onclick="confirmModal()">Confirm</button>
            </div>
        </div>
    </div>

    <!-- ===== TOAST ===== -->
    <div class="toast" id="toast"></div>

    <!-- ===== APP ===== -->
    <div class="app-container">

        <!-- ===== SIDEBAR ===== -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <a href="index.html" class="logo">
                    <span class="logo-icon">✦</span>
                    <span class="logo-text">NEXUS AI</span>
                </a>
                <button class="sidebar-close" onclick="toggleSidebar()">✕</button>
            </div>
            <div class="sidebar-content">
                <div class="section-label">Recent Chats</div>
                <div id="chatList"><div class="empty-state">No chats yet</div></div>
            </div>
            <div class="sidebar-footer">
                <button class="btn-new" onclick="newChat()">✨ New Chat</button>
                <button class="btn-clear" onclick="clearAllChats()">🗑️ Clear</button>
            </div>
        </aside>

        <!-- ===== MAIN CHAT ===== -->
        <main class="main-chat">

            <header class="chat-header">
                <div class="left">
                    <button class="hamburger" onclick="toggleSidebar()">☰</button>
                    <div class="title">NEXUS <span>AI</span></div>
                </div>
                <div class="right">
                    <button class="header-btn" onclick="newChat()">✨ New</button>
                    <button class="header-btn" onclick="location.reload()">⟳</button>
                    <button class="header-btn mobile-show" onclick="toggleSidebar()">📂</button>
                </div>
            </header>

            <div class="messages-container" id="messagesContainer">
                <div class="welcome-screen">
                    <span class="icon">✦</span>
                    <h1>NEXUS AI</h1>
                    <p>Your intelligent assistant with free web search. Ask me anything!</p>
                    <div class="features">
                        <div class="feat"><span>🔍</span> Web Search</div>
                        <div class="feat"><span>💻</span> Code</div>
                        <div class="feat"><span>🧠</span> Memory</div>
                        <div class="feat"><span>🔒</span> Private</div>
                    </div>
                </div>
            </div>

            <div class="input-container">
                <div class="input-wrapper">
                    <input type="text" id="userInput" placeholder="Ask me anything..." />
                    <button id="sendBtn">Send</button>
                </div>
                <div class="input-footer">
                    <a href="privacy.html">Privacy</a>
                    <span>•</span>
                    <a href="terms.html">Terms</a>
                    <span>•</span>
                    <span class="powered-by">⚡ Free Search</span>
                </div>
            </div>

        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
